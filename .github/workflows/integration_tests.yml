name: Vedic Kernel Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn torch joblib

    - name: Compile C++ Kernel
      run: |
        make clean
        make -j$(nproc)

    - name: Run Integration Tests
      run: |
        # Ensure the binary is executable and run the test suite
        chmod +x vedic_engine
        python3 tests/test_kernel.py
