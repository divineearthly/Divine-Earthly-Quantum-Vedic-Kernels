name: Vedic Kernel Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write # Added for potential future package publishing

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Print Environment Details
      run: |
        echo "--- Current Working Directory ---"
        pwd
        echo "--- Files in Repository Root ---"
        ls -la
        echo "--- Python Version ---"
        python3 --version
        echo "--- Pip Version ---"
        pip --version

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        set -x # Enable verbose logging
        python -m pip install --upgrade pip
        pip install pandas scikit-learn torch joblib

    - name: Compile C++ Kernel
      run: |
        set -x # Enable verbose logging
        make clean
        make -j$(nproc)

    - name: Run Integration Tests
      run: |
        set -x # Enable verbose logging
        chmod +x vedic_engine
        python3 tests/test_kernel.py
