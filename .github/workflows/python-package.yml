name: Vedic-Quantum CI/CD Unified Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ python3-dev

    - name: Install Python Packages
      run: |
        python -m pip install --upgrade pip
        pip install numpy pybind11 qiskit qiskit-aer

    - name: Compile Unified Optimized C++ Kernel
      run: |
        g++ -O3 -Wall -shared -std=c++11 -fPIC $(python3 -m pybind11 --includes)         kernels/vedic_kernels.c kernels/vedic_quantum_unified.cpp         -o vedic_quantum_lib$(python3-config --extension-suffix)

    - name: Run Basic Import Test
      run: |
        python3 -c "import vedic_quantum_lib; print('vedic_quantum_lib imported successfully.'); print(dir(vedic_quantum_lib))"

    - name: Run Unit Tests for Unified Library
      run: |
        python3 test_vedic_kernel.py
