name: Divine Earthly CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev pybind11-dev g++
          python -m pip install --upgrade pip
          pip install numpy pybind11
      - name: Compile Unified Optimized C++ Kernel
        run: |
          SUFFIX=$(python3-config --extension-suffix)
          g++ -O3 -Wall -shared -std=c++17 -fPIC $(python3 -m pybind11 --includes) kernels/nikhilam_kernel.cpp -o vedic_kernels${SUFFIX}
      - name: Basic Import Test
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python3 -c "import vedic_kernels; print('Kernel Loaded Successfully')"
