
name: Divine Earthly Universal Solver
on:
  push:
    branches: [ "master", "main" ]
  schedule:
    - cron: '30 0 * * *'  # 05:30 AM IST
  workflow_dispatch:      # <--- THE MANUAL OVERRIDE BUTTON
jobs:
  solve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Run Master-Core Logic
        run: python master_core.py
      - name: Commit Results
        run: |
          git config --global user.name 'Divine-Earthly-Bot'
          git config --global user.email 'bot@divineearthly.ai'
          git add .
          git commit -m "Autonomous Synthesis: 16-Sutra Health Node [Eclipse Run]" || echo "No changes"
          git push
