
name: Divine Earthly CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pybind11 cmake g++
      - name: Compile Unified Optimized C++ Kernel
        run: |
          g++ -O3 -Wall -shared -std=c++17 -fPIC $(python3 -m pybind11 --includes) kernel.cpp -o vedic_kernels$(python3-config --extension-suffix)
      - name: Basic Import Test
        run: python3 -c "import vedic_kernels; print('Kernel Loaded Successfully')"
